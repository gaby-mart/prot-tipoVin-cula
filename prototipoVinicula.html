<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Vinhos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>

    <div class="header-left">
        <button class="homeButton"><a href="#"></a>Home</button>
        <button class="buttonProduct"><a href="#"></a>Produtos</button>
        <button class="buttonSobre"><a href=""></a>Sobre</button>
    </div>

    <div class="header-center">
        <input type="text" class="askProduct" placeholder="Buscar vinho...">

        <button class="magnifyingButton">
            <i class="fa-solid fa-search"></i>
        </button>
    </div>

    <div class="header-right">
        <button class="loginButton">Login</button>

        <button class="cartButton">
            <img src="imagens/carrinhoCompras.png" width="30">
        </button>
    </div>

</header>

<main id="content">

    <section id="home">
        <div id="cta">
            <h1 class="title">
            O verdadeiro sabor do <br> <span>vinho</span>
            </h1>
        <p class="description">
            Descubra vinhos selecionados com qualidade premium.
            Sabores únicos para momentos especiais.
        </p>
        <div id="cta_buttons">
            <a href="produtos.html" class="btn-default">
                Ver produtos
            </a>
            <a href="tel:+5519982861171" id="phone_button">
                <button class="btn-default">
                    <i class="fa-solid fa-phone"></i>
                    (19) 99999-9999
                </button>
            </a>
        </div>
    </div>
    
</section>

</main>
<footer>
    <h3>Exemplo</h3>
</footer>

</body>
</html>
